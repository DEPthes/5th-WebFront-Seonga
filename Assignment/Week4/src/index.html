<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Week4 To do List</title>
    <link rel="stylesheet" href="./style.css" />
    <script defer src="./script.js"></script>
  </head>
  <body>
    <main class="todo-app">
      <section class="todo-panel" aria-labelledby="todoTitle">
        <div class="title-area">
          <p class="eyebrow">Week4 JavaScript</p>
          <h1 id="todoTitle">To do List</h1>
        </div>

        <form class="add-form" id="todoForm">
          <input
            class="todo-input"
            id="todoInput"
            type="text"
            placeholder="새로운 할 일 추가하기"
            aria-label="새로운 할 일 추가하기"
          />
          <button class="submit-button" type="submit" aria-label="할 일 추가">+</button>
        </form>

        <!-- JS에서 할 일 객체 배열을 반복하며 목록을 넣어 줄 영역입니다. -->
        <div class="todo-list" id="todoList" aria-live="polite"></div>
      </section>
    </main>
  </body>
</html>
