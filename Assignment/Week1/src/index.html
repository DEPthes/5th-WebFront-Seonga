<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DEPth Week1 Assignment</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      
      <!-- navigation -->
      <header class="nav">
        <h1 class="nav__logo">天眞浪漫</h1>
        <div class="nav__actions">
          <img class="nav__brand-icon" src="./assets/saero_logo.svg" />
          <img class="nav__next-icon" src="./assets/arrow_right.svg" />
        </div>
      </header>

      <!-- main -->
      <main class="content">

        <!-- main banner -->
        <section class="banner">
          <img class="banner__img" src="./assets/banner.svg" />
        </section>

        <!-- notice section -->
        <section class="notice-section">
          <button class="notice-section__btn" type="button">
            <span class="notice-section__info">
              <img src="./assets/alarm.svg" />
              <span>공지사항</span>
            </span>
            <img src="./assets/arrow_right.svg" />
          </button>
        </section>

        <!-- artist section -->
        <section class="artist-section">
          <img class="artist-section__image" src="./assets/artist.png" />

          <article class="artist-box">
            <img
              class="artist-box__edge artist-box__edge--top-left"
              src="./assets/border.svg"
            />
            <img
              class="artist-box__edge artist-box__edge--top-right"
              src="./assets/border.svg"
            />
            <img
              class="artist-box__edge artist-box__edge--bottom-left"
              src="./assets/border.svg"
            />
            <img
              class="artist-box__edge artist-box__edge--bottom-right"
              src="./assets/border.svg"
            />

            <div class="artist-box__date">DAY 2</div>
            <img
              class="artist-box__line"
              src="./assets/artistcard_divider.svg"
            />
            <div class="artist-box__title">볼빨간사춘기</div>
          </article>
        </section>

      </main>

      <!-- footer -->
      <footer class="footer-area">
        <div class="footer-area__brand">
          <img class="footer-area__logo" src="./assets/DEPth_logo.svg" />
        </div>

        <div class="footer-area__sns">
          <button class="footer-area__sns-btn" type="button">
            <img src="./assets/link.svg" />
          </button>
          <button class="footer-area__sns-btn" type="button">
            <img src="./assets/GitHub.svg" />
          </button>
          <button class="footer-area__sns-btn" type="button">
            <img src="./assets/Instagram.svg" />
          </button>
          <button class="footer-area__sns-btn" type="button">
            <img src="./assets/Email.svg" />
          </button>
        </div>

        <img class="footer-area__divider" src="./assets/divider.svg" />

        <p class="footer-area__text">
          Copyright © DEPth MJU.<br />
          All Rights Reserved
        </p>
      </footer>

    </div>
  </body>
</html>
